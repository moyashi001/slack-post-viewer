<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Slack検索文言</title>
<meta name="theme-color" content="#4A154B">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- 1. ホーム画面 -->
  <section id="screen-home" class="screen">
    <div class="home-hero">
      <h1>Slack検索文言</h1>
      <p class="sub">条件を選ぶだけでSlack検索欄に貼る文言を作成します</p>
    </div>
    <nav class="home-nav">
      <button id="btn-goto-condition" class="btn btn-primary" type="button">検索条件を設定する</button>
      <button id="btn-goto-users" class="btn btn-slack" type="button">ユーザー管理</button>
      <button id="btn-goto-channels" class="btn btn-slack" type="button">チャンネル管理</button>
    </nav>

    <div class="data-io">
      <div class="data-io-links">
        <button id="btn-export" class="btn-text btn-text-light" type="button">他の端末に引き継ぐ (エクスポート)</button>
        <button id="btn-import" class="btn-text btn-text-light" type="button">他の端末から取り込む (インポート)</button>
      </div>

      <div id="export-box" class="data-io-box hidden">
        <textarea id="export-text" class="data-io-textarea" readonly></textarea>
        <button id="btn-copy-export" class="btn btn-slack" type="button">コピーする</button>
        <p id="export-message" class="copy-message hidden">コピーしました</p>
      </div>

      <div id="import-box" class="data-io-box hidden">
        <textarea id="import-text" class="data-io-textarea" placeholder="エクスポートしたテキストをここに貼り付け"></textarea>
        <button id="btn-do-import" class="btn btn-slack" type="button">読み込む</button>
        <p class="hint-text">読み込むと現在登録されているユーザー・チャンネルは上書きされます。</p>
        <p id="import-message" class="error-text hidden"></p>
      </div>
    </div>
  </section>

  <!-- 2. ユーザー管理画面 -->
  <section id="screen-users" class="screen hidden">
    <header class="app-header">
      <button class="btn-text btn-home" data-back="home" type="button">← 戻る</button>
      <h2>ユーザー管理</h2>
    </header>

    <div id="user-manage-list" class="manage-list"></div>

    <form id="form-add-user" class="add-form add-form-user">
      <input type="text" id="input-add-user" placeholder="ユーザー名 (例: 田中 太郎)" autocomplete="off">
      <input type="text" id="input-add-user-id" placeholder="任意: SlackメンバーID (例: U0123ABCD)" autocomplete="off">
      <input type="email" id="input-add-user-email" placeholder="任意: メールアドレス" autocomplete="off">
      <button type="submit" class="btn btn-primary btn-add">追加</button>
    </form>
    <p class="hint-text">検索時はメンバーID＞メールアドレス＞ユーザー名の順で使われます。メンバーIDかメールアドレスがあると、貼り付け時にSlackがユーザーとして認識しやすくなります。</p>
    <p id="user-form-error" class="error-text hidden"></p>
  </section>

  <!-- 3. チャンネル管理画面 -->
  <section id="screen-channels" class="screen hidden">
    <header class="app-header">
      <button class="btn-text btn-home" data-back="home" type="button">← 戻る</button>
      <h2>チャンネル管理</h2>
    </header>

    <div id="channel-manage-list" class="manage-list"></div>

    <form id="form-add-channel" class="add-form">
      <input type="text" id="input-add-channel" placeholder="チャンネル名 (例: general)" autocomplete="off">
      <button type="submit" class="btn btn-primary btn-add">追加</button>
    </form>
    <p id="channel-form-error" class="error-text hidden"></p>
  </section>

  <!-- 4. 条件入力画面 -->
  <section id="screen-condition" class="screen hidden">
    <header class="app-header">
      <button class="btn-text btn-home" data-back="home" type="button">← 戻る</button>
      <h2>検索条件</h2>
    </header>

    <div class="form-group">
      <label>ユーザー選択</label>
      <div id="condition-user-list" class="check-list"></div>
      <p id="condition-user-empty" class="empty-text hidden">
        登録済みユーザーがいません。<button class="btn-text" data-nav="users" type="button">ユーザー管理へ</button>
      </p>
    </div>

    <div class="form-group">
      <label>チャンネル選択</label>
      <div id="condition-channel-list" class="check-list"></div>
      <p id="condition-channel-empty" class="empty-text hidden">
        登録済みチャンネルがありません。<button class="btn-text" data-nav="channels" type="button">チャンネル管理へ</button>
      </p>
    </div>

    <div class="form-group">
      <label>日付範囲</label>
      <div class="preset-bar">
        <button class="preset-btn" data-days="1" type="button">1日</button>
        <button class="preset-btn" data-days="3" type="button">3日</button>
        <button class="preset-btn" data-days="5" type="button">5日</button>
        <button class="preset-btn" data-days="10" type="button">10日</button>
        <button class="preset-btn" data-days="20" type="button">20日</button>
        <button class="preset-btn" data-days="30" type="button">30日</button>
      </div>
      <div class="date-range">
        <div class="date-field">
          <label for="date-from">開始日</label>
          <input type="date" id="date-from">
        </div>
        <div class="date-field">
          <label for="date-to">終了日</label>
          <input type="date" id="date-to">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>並び順</label>
      <div class="sort-choice">
        <label class="radio-item">
          <input type="radio" name="sort" value="user" checked>
          <span>ユーザー名順</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="sort" value="date">
          <span>日付順</span>
        </label>
      </div>
    </div>

    <button id="btn-generate" class="btn btn-primary" type="button">検索文言を生成する</button>
    <p id="condition-error" class="error-text hidden"></p>
  </section>

  <!-- 5. 結果画面 -->
  <section id="screen-result" class="screen hidden">
    <header class="app-header">
      <button class="btn-text" data-back="condition" type="button">← 戻る</button>
      <h2>検索文言</h2>
    </header>

    <pre id="result-query" class="result-query"></pre>
    <button id="btn-copy" class="btn btn-primary" type="button">コピーする</button>
    <p id="copy-message" class="copy-message hidden">コピーしました</p>
    <p class="hint-text">Slackの検索欄に貼り付けるだけで検索できます。</p>
    <button class="btn-text btn-home" data-back="home" type="button">ホームに戻る</button>
  </section>

</div>
<script src="app.js"></script>
</body>
</html>
